name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "$tag" ]; then
            echo "Tag is empty" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npm run package

      - name: Locate VSIX asset
        id: vsix
        shell: bash
        run: |
          vsix=$(ls -1 *.vsix | head -n 1)
          if [ -z "$vsix" ]; then
            echo "No VSIX file found after packaging" >&2
            exit 1
          fi
          echo "path=$vsix" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          artifacts: ${{ steps.vsix.outputs.path }}
          allowUpdates: false
          replacesArtifacts: false
          generateReleaseNotes: true
